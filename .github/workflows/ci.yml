# Testes do pacote corporate-instructions-mcp em push/PR na main.
name: CI

on:
  push:
    branches: [main]
    paths:
      - "mcp-instructions-server/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "mcp-instructions-server/**"
      - ".github/workflows/ci.yml"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: mcp-instructions-server/pyproject.toml

      - name: Install package and dev deps
        working-directory: mcp-instructions-server
        run: pip install -e ".[dev]"

      - name: Run tests
        working-directory: mcp-instructions-server
        run: pytest -q
