# Executar manualmente em Actions → Release → Run workflow (escolhe a branch, ex.: main).
# Usa `version` em mcp-instructions-server/pyproject.toml no commit da branch; falha se a tag v* já existir.
# Corre testes, build e cria tag + GitHub Release com `gh release create` e os artefactos em dist/.
#
# Fluxo: atualiza a versão em pyproject.toml, faz commit + push na branch; depois corre este workflow nessa branch.
name: Release

on:
  workflow_dispatch:

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read version from pyproject.toml
        id: version
        run: |
          python3 << 'PY'
          import os
          import re
          from pathlib import Path

          text = Path("mcp-instructions-server/pyproject.toml").read_text(encoding="utf-8")
          m = re.search(r'^version\s*=\s*"([^"]+)"', text, flags=re.MULTILINE)
          if not m:
              raise SystemExit("no version in mcp-instructions-server/pyproject.toml")
          ver = m.group(1)
          if not re.fullmatch(r"\d+\.\d+\.\d+", ver):
              raise SystemExit(f"version must be semver X.Y.Z, got {ver!r}")
          tag = f"v{ver}"
          gh_out = os.environ["GITHUB_OUTPUT"]
          with open(gh_out, "a", encoding="utf-8") as f:
              f.write(f"version={ver}\n")
              f.write(f"tag={tag}\n")
          print(ver, tag)
          PY

      - name: Refuse if release tag already exists
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          if [ -n "$(git ls-remote --tags origin "refs/tags/${TAG}")" ]; then
            echo "::error::A tag ${TAG} já existe no remoto. Aumenta version em pyproject.toml e faz push antes de voltar a correr o Release."
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: mcp-instructions-server/pyproject.toml

      - name: Install package and dev deps
        working-directory: mcp-instructions-server
        run: pip install -e ".[dev]"

      - name: Run tests
        working-directory: mcp-instructions-server
        run: pytest -q

      - name: Install build
        run: pip install build

      - name: Build sdist and wheel
        working-directory: mcp-instructions-server
        run: python -m build

      - name: Create GitHub Release and tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ steps.version.outputs.tag }}"
          shopt -s nullglob
          assets=(mcp-instructions-server/dist/*)
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "::error::Nenhum ficheiro em mcp-instructions-server/dist/"
            exit 1
          fi
          gh release create "${TAG}" \
            --target "${GITHUB_SHA}" \
            --title "${TAG}" \
            --generate-notes \
            "${assets[@]}"
